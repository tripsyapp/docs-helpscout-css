<!-- Move article count badge para dentro do h3, exibindo só o número -->
<script type="text/javascript">
(function() {
  function moveBadges() {
    var categories = document.querySelectorAll('.category-list .category');
    categories.forEach(function(card) {
      var h3 = card.querySelector('h3');
      var count = card.querySelector('.article-count');
      if (h3 && count) {
        count.textContent = count.textContent.replace(/\D/g, '');
        h3.appendChild(count);
      }
    });
  }

  if (document.readyState === 'complete') {
    moveBadges();
  } else {
    window.addEventListener('load', moveBadges, false);
  }
})();
</script>
